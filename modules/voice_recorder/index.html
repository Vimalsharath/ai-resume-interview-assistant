<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Voice Recorder</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 12px;
        background: linear-gradient(135deg, #07111f, #0f172a);
        color: #f8fafc;
      }
      button {
        padding: 10px 14px;
        cursor: pointer;
        border-radius: 999px;
        border: none;
        background: linear-gradient(90deg, #38bdf8, #6366f1);
        color: white;
        font-weight: 600;
      }
      #status {
        margin-top: 10px;
        color: #cbd5e1;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <button id="record-btn">Start Recording</button>
    <div id="status">Click to start recording.</div>
    <script>
      const status = document.getElementById('status');
      const button = document.getElementById('record-btn');
      let recognition;
      let listening = false;
      let started = false;

      function setStatus(message) {
        status.textContent = message;
      }

      function resetButton() {
        button.textContent = 'Start Recording';
      }

      function startListening() {
        if (!recognition) {
          setStatus('Speech recognition is not supported in this browser.');
          return;
        }

        if (listening || started) {
          return;
        }

        started = true;
        recognition.start();
      }

      if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = 'en-US';

        recognition.onstart = () => {
          listening = true;
          button.textContent = 'Listening...';
          setStatus('Listening for your answer...');
        };

        recognition.onerror = (event) => {
          listening = false;
          started = false;
          resetButton();
          const message = event.error === 'not-allowed' ? 'Microphone permission was denied.' : `Voice input unavailable: ${event.error}`;
          setStatus(message);
          Streamlit.setComponentValue('');
        };

        recognition.onend = () => {
          listening = false;
          started = false;
          resetButton();
        };

        recognition.onresult = (event) => {
          const transcript = Array.from(event.results)
            .map((result) => result[0].transcript)
            .join(' ')
            .trim();
          setStatus(transcript || 'No speech detected.');
          Streamlit.setComponentValue(transcript);
        };
      } else {
        setStatus('Speech recognition is not supported in this browser.');
      }

      button.addEventListener('click', () => {
        if (!recognition) {
          setStatus('Speech recognition is not supported in this browser.');
          return;
        }

        if (listening) {
          recognition.stop();
          return;
        }

        startListening();
      });

      window.addEventListener('load', () => {
        setTimeout(startListening, 250);
      });
    </script>
  </body>
</html>
